<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sphere position="0 1.60 -5" radius="0.50" color="white"></a-sphere>
      <a-sphere position="0 0.60 -5" radius="0.75" color="white"></a-sphere>
      <a-sphere position="0 2.30 -5" radius="0.35" color="white"></a-sphere>

      <a-cone position="0 2.1 -3" rotation="90" radius-bottom="0.05" radius-top="0" height="0.3" color="orange"></a-cone>
      <a-cylinder position="0.5 1.5 -5" rotation="0 0 45" radius="0.05" height="1.0" color="brown"></a-cylinder>
      <a-cylinder position="-0.5 1.9 -5" rotation="0 0 -135" radius="0.05" height="1.0" color="brown"></a-cylinder>

      // the hat
      <a-cylinder position="0 2.8 -5" radius="0.3" height="0.5" color="black"></a-cylinder>
      <a-cylinder position="0 2.58 -5" radius="0.5" height="0.05" color="black"></a-cylinder>
      <a-cylinder position="0 2.7 -5" radius="0.31" height="0.15" color="yellow"></a-cylinder>

      // the buttons
      <a-sphere position="0 0.6 -4" radius="0.1" color="grey"></a-sphere>
      <a-sphere position="0 1 -4" radius="0.1" color="grey"></a-sphere>
      <a-sphere position="0 1.65 -4" radius="0.08" color="grey"></a-sphere>

      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: contact; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
