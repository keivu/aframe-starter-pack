<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
          <a-assets-item id="goomba" src="assets/Goomba/goomba.gltf"></a-assets-item>
          <a-assets-item id="mario" src="assets/Mario/mario.gltf"></a-assets-item>
          <a-assets-item id="jumping" src="assets/JumpingMario/jumping.gltf"></a-assets-item>
          <a-assets-item id="mushroom" src="assets/RedMushroom/mushroom.gltf"></a-assets-item>
      </a-assets>

      <a-entity gltf-model="#goomba" rotation="0 60 0"position="-4 .2 -4" scale=".015 .015 .015"></a-entity>
      <a-entity gltf-model="#mario" rotation="0 60 0" position="0 .7 -4" scale=".25 .25 .25"></a-entity>
      <a-entity gltf-model="#jumping" position="2.5 2 -4"></a-entity>
      <a-entity gltf-model="#jumping" position="7 3 -4" scale="1.5 1.5 1.5"></a-entity>
      <a-entity gltf-model="#jumping" position="9 4 -4" scale="2 2 2"></a-entity>
      <a-entity gltf-model="#jumping" position="5 1.5 -4"></a-entity>
      <a-entity gltf-model="#mushroom" rotation="0 -45 0" position="5 3 -4" scale=".15 .15 .15"></a-entity>
      <a-entity gltf-model="#mushroom" position="3 5 -4" scale=".15 .15 .15"></a-entity>

      <a-cylinder position="0 -1 -4" radius="1" height="3" color="green"></a-cylinder>
      <a-cylinder position="0 .5 -4" radius="1.2" height=".7" color="green"></a-cylinder>
      <a-cylinder position="-4 -1.5 -4" radius="1" height="3" color="green"></a-cylinder>
      <a-cylinder position="-4 0 -4" radius="1.2" height=".7" color="green"></a-cylinder>
      <a-box position="3 4 -4" color="yellow" scale="1.3 1.3 1.3"></a-box>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
